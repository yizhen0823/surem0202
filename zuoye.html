<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>姚宜蓁 | 個人履歷與音樂空間</title>
    <style>
        :root {
            --garden-green: #92ba92;
            --flower-pink: #ffc0cb;
            --leaf-dark: #52734d;
            --soft-white: #f8f9fa;
        }

        body {
            background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%);
            font-family: "Microsoft JhengHei", sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* 飄浮的花草裝飾 */
        .decoration {
            position: absolute;
            font-size: 2rem;
            z-index: 0;
            animation: floating 4s ease-in-out infinite;
            user-select: none;
        }

        @keyframes floating {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(10deg); }
        }

        .resume-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            border-radius: 40px;
            padding: 40px;
            width: 380px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            border: 3px solid white;
            text-align: center;
            position: relative;
            z-index: 10;
        }

        .profile-img {
            width: 100px;
            height: 100px;
            background: var(--flower-pink);
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 50px;
            border: 5px solid white;
        }

        h1 {
            margin: 10px 0;
            color: var(--leaf-dark);
            letter-spacing: 5px;
        }

        .id-badge {
            background: var(--leaf-dark);
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
            display: inline-block;
            margin-bottom: 20px;
        }

        /* MP3 播放器樣式自定義 */
        .music-box {
            background: white;
            padding: 15px;
            border-radius: 25px;
            margin-top: 25px;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.05);
        }

        .music-title {
            font-size: 0.8rem;
            color: #888;
            margin-bottom: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 5px;
        }

        audio {
            width: 100%;
            height: 35px;
            outline: none;
        }

        .info-list {
            text-align: left;
            font-size: 0.95rem;
            color: #555;
            line-height: 2;
            margin: 20px 0;
        }

        .footer-grass {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 10px;
            background: var(--garden-green);
            border-radius: 0 0 40px 40px;
        }
    </style>
</head>
<body>

    <div class="decoration" style="top:10%; left:10%;">🌿</div>
    <div class="decoration" style="top:20%; right:15%; animation-delay: 1s;">🌸</div>
    <div class="decoration" style="bottom:15%; left:15%; animation-delay: 2s;">🌼</div>
    <div class="decoration" style="bottom:10%; right:10%; animation-delay: 0.5s;">🍃</div>

    <div class="resume-card">
        <div class="profile-img">蓁</div>
        
        <h1>姚宜蓁</h1>
        <div class="id-badge">學號：114024082</div>
        
        <div class="info-list">
            <li>📍 亞洲大學 資訊傳播學系</li>
            <li>🎸 擅長：鋼琴演奏、貝斯演奏</li>
            <li>🎨 專注：網頁開發、視覺品牌設計</li>
        </div>

        <div class="music-box">
            <div class="music-title">🎵 正在播放：輕快森林小夜曲</div>
            <audio controls loop>
                <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3" type="audio/mpeg">
                您的瀏覽器不支援音樂播放功能。
            </audio>
        </div>

        <p style="font-size: 12px; color: #ccc; margin-top: 15px;">Made with 💚 by Yao Yi-zhen</p>
        <div class="footer-grass"></div>
    </div>

</body>
</html>
