<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>姚宜蓁｜個人履歷</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #fb923c;
            --primary-dark: #f97316;
            --bg-gradient: linear-gradient(135deg, #fff7ed, #ffe4e6);
            --card-bg: rgba(255, 255, 255, 0.8);
            --text-main: #5a3e36;
            --text-muted: #8c7169;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        }

        .dark-mode {
            --primary: #f97316;
            --primary-dark: #ea580c;
            --bg-gradient: linear-gradient(135deg, #1c1917, #292524);
            --card-bg: rgba(68, 64, 60, 0.8);
            --text-main: #f5e9e2;
            --text-muted: #a8a29e;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        * {
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            margin: 0;
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--text-main);
            line-height: 1.6;
        }

        header {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            text-align: center;
            padding: 80px 20px;
            clip-path: ellipse(120% 100% at 50% 0%);
        }

        .avatar {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid rgba(255,255,255,0.8);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            margin-bottom: 20px;
        }

        header h1 {
            margin: 0;
            font-size: 2.5rem;
            letter-spacing: 3px;
            font-weight: 700;
        }

        .student-id {
            margin-top: 10px;
            font-size: 1.1rem;
            opacity: 0.9;
            letter-spacing: 1px;
        }

        .mode-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            background: var(--card-bg);
            border: none;
            padding: 12px;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: var(--shadow);
            color: var(--primary);
            font-size: 1.2rem;
        }

        .container {
            max-width: 1100px;
            margin: -40px auto 40px;
            padding: 0 20px;
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 25px;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 24px;
            box-shadow: var(--shadow);
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

<!-- 背景音樂 -->
<audio autoplay loop hidden>
    <source src="https://www.bensound.com/bensound-music/bensound-sunny.mp3" type="audio/mpeg">
</audio>

<header>
    <img class="avatar" src="https://i.pravatar.cc/300" alt="姚宜蓁">
    <h1>姚宜蓁</h1>
    <div class="student-id">學號：114024082</div>
    <p>亞洲大學｜資訊傳播系</p>
</header>

</body>
</html>
