<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>姚宜蓁 | 互動個人履歷</title>
    <style>
        :root {
            --primary: #FF8C42; /* 暖橘 */
            --bg: #FFF9F5;
            --card-bg: #FFFFFF;
            --text: #5D4037;
            --accent: #FFD166;
            --disk-color: #333;
        }

        .cool-mode {
            --primary: #54A0FF; /* 文藝藍 */
            --bg: #F0F7FF;
            --card-bg: #FFFFFF;
            --text: #2C3E50;
            --accent: #AEE2FF;
        }

        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0; padding: 40px 20px;
            transition: all 0.5s ease;
            display: flex; flex-direction: column; align-items: center;
        }

        .main-container { max-width: 950px; width: 100%; }

        /* 切換按鈕 */
        .mode-toggle {
            position: fixed; top: 20px; right: 20px; z-index: 1000;
        }
        .btn {
            padding: 10px 20px; border-radius: 50px; border: none; cursor: pointer;
            background: var(--primary); color: white; font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        /* 頂部資訊區 (活潑不對稱排版) */
        .profile-card {
            display: grid; grid-template-columns: 200px 1fr; gap: 40px;
            background: var(--card-bg); border-radius: 40px 10px 40px 10px;
            padding: 40px; margin-bottom: 50px; box-shadow: 10px 10px 0px var(--accent);
        }
        .avatar {
            width: 200px; height: 200px; border-radius: 20px;
            object-fit: cover; transform: rotate(-3deg); border: 8px solid white;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        /* 興趣標籤 */
        .tag {
            display: inline-block; padding: 6px 16px; margin: 5px;
            border-radius: 50px; background: var(--bg); color: var(--primary);
            font-weight: bold; border: 2px solid var(--primary);
        }

        /* 證照獨立區塊 (與上方區塊大幅度隔開) */
        .cert-container {
            margin-top: 60px; display: flex; flex-direction: column; gap: 20px;
        }
        .cert-card {
            background: var(--primary); color: white; padding: 25px;
            border-radius: 15px; width: fit-content; align-self: flex-end;
            transform: skewX(-5deg); box-shadow: 5px 5px 0px var(--text);
        }
        .cert-card:nth-child(even) { align-self: flex-start; transform: skewX(5deg); background: var(--accent); color: var(--text); }

        /* --- 黑膠唱片播放器排版 --- */
        .vinyl-player {
            position: fixed; bottom: 30px; left: 30px;
            background: white; padding: 20px 30px; border-radius: 100px;
            display: flex; align-items: center; gap: 20px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.15); z-index: 1000;
        }

        .disk {
            width: 60px; height: 60px; background: var(--disk-color);
            border-radius: 50%; border: 2px solid #555;
            position: relative; display: flex; align-items: center; justify-content: center;
        }
        .disk::after {
            content: ''; width: 20px; height: 20px; background: white; border-radius: 50%;
        }
        .disk.playing { animation: rotateDisk 3s linear infinite; }

        @keyframes rotateDisk { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .player-controls { display: flex; flex-direction: column; }
        .song-title { font-size: 14px; font-weight: bold; color: var(--primary); margin-bottom: 5px; }

        /* 響應式 */
        @media (max-width: 768px) {
            .profile-card { grid-template-columns: 1fr; text-align: center; }
            .avatar { transform: rotate(0); }
            .vinyl-player { left: 50%; transform: translateX(-50%); width: 80%; }
        }
    </style>
</head>
<body>

<div class="mode-toggle">
    <button class="btn" onclick="toggleMode()">切換模式</button>
</div>

<div class="main-container">
    <div class="profile-card">
        <img id="myAvatar" src="" class="avatar" alt="姚宜蓁">
        <div class="info">
            <h1 style="font-size: 45px; margin: 0; color: var(--primary);">姚宜蓁</h1>
            <p style="font-size: 20px; letter-spacing: 2px;">學號：114024082 | 資訊傳播系</p>
            <div style="margin-top: 20px;">
                <span class="tag">🎹 鋼琴</span>
                <span class="tag">📸 攝影</span>
                <span class="tag">🎨 繪畫</span>
            </div>
            <p style="margin-top: 20px; line-height: 1.8;">
                我是宜蓁，來自資傳系。喜歡在程式碼中注入美感，在畫面中尋找節奏。
                這份履歷是我對網頁互動的一次小實驗。
            </p>
        </div>
    </div>

    <div class="cert-container">
        <div class="cert-card">🏆 電腦繪圖國際認證</div>
        <div class="cert-card">🏆 網頁設計技術士證照</div>
        <div class="cert-card">🏆 鋼琴檢定合格</div>
    </div>
</div>

<div class="vinyl-player">
    <div class="disk" id="vinylDisk"></div>
    <div class="player-controls">
        <div class="song-title" id="trackName">Music: 點擊播放音樂</div>
        <audio id="bgMusic" onplay="startDisk()" onpause="stopDisk()">
            <source src="music.mp3" type="audio/mpeg">
        </audio>
        <select id="trackSelect" onchange="changeTrack()" style="border: 1px solid #ddd; border-radius: 5px; padding: 2px;">
            <option value="music.mp3">我的音樂 01</option>
            <option value="music02.mp3">我的音樂 02</option>
        </select>
    </div>
</div>

<script>
    const audio = document.getElementById('bgMusic');
    const disk = document.getElementById('vinylDisk');

    // 切換顏色模式
    function toggleMode() {
        document.body.classList.toggle('cool-mode');
    }

    // 音樂控制
    function startDisk() { disk.classList.add('playing'); }
    function stopDisk() { disk.classList.remove('playing'); }

    function changeTrack() {
        const select = document.getElementById('trackSelect');
        audio.src = select.value;
        document.getElementById('trackName').innerText = "Music: " + select.options[select.selectedIndex].text;
        audio.play();
    }

    // 隨機頭貼
    window.onload = () => {
        const rand = Math.floor(Math.random() * 1000);
        document.getElementById('myAvatar').src = `https://i.pravatar.cc/300?u=${rand}`;
    };
</script>

</body>
</html>
