<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>姚宜蓁 | 個人動態履歷</title>

<style>
:root {
    --warm-bg: #FFF7F0;
    --main-orange: #FF8A5B;
    --soft-peach: #FFD1BA;
    --accent-yellow: #FFE066;
    --text-dark: #5A3E36;
}

body {
    font-family: 'PingFang TC','Microsoft JhengHei',sans-serif;
    background: linear-gradient(135deg,#FFF7F0,#FFEBDD);
    margin: 0;
    padding: 40px 20px;
    color: var(--text-dark);
    display: flex;
    flex-direction: column;
    align-items: center;
}

/* 背景柔光 */
body::before {
    content:"";
    position: fixed;
    width:200%;
    height:200%;
    background: radial-gradient(circle, rgba(255,138,91,0.15), transparent 60%);
    animation: float 10s infinite alternate;
    z-index:-1;
}
@keyframes float {
    from { transform: translate(-10%,-10%) scale(1); }
    to { transform: translate(0%,0%) scale(1.2); }
}

/* 排版 */
.main-wrapper {
    max-width: 950px;
    width: 100%;
    display: grid;
    grid-template-columns: 1fr 1.5fr;
    gap: 25px;
    margin-bottom: 80px;
}

/* 卡片 */
.card {
    background: rgba(255,255,255,0.9);
    border-radius: 25px;
    padding: 30px;
    box-shadow: 0 10px 30px rgba(255,138,91,0.2);
    transition: 0.3s;
}
.card:hover {
    transform: translateY(-6px);
}

/* 左側 */
.left-col { display:flex; flex-direction:column; gap:25px; }

.profile-card {
    text-align:center;
    background: linear-gradient(135deg,#FF8A5B,#FFC3A0);
    color:white;
}

.avatar-container {
    width:150px;
    height:150px;
    margin:0 auto 20px;
    border-radius:50%;
    overflow:hidden;
    border:4px solid rgba(255,255,255,0.5);
}
.avatar-container img {
    width:100%;
    height:100%;
    object-fit:cover;
}

/* 標題 */
.section-title {
    font-size:20px;
    font-weight:bold;
    color:var(--main-orange);
    margin-bottom:15px;
    position:relative;
}
.section-title::after {
    content:"";
    width:40px;
    height:3px;
    background:var(--accent-yellow);
    display:block;
    margin-top:5px;
}

/* 興趣 */
.interest-item {
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:12px;
}
.interest-icon {
    width:35px;
    height:35px;
    background:var(--soft-peach);
    border-radius:10px;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* 音樂播放器 */
.audio-bar {
    position: fixed;
    bottom:20px;
    width:90%;
    max-width:800px;
    background:white;
    padding:15px 25px;
    border-radius:50px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    box-shadow:0 5px 25px rgba(0,0,0,0.1);
}

/* 音樂動畫 */
.viz-bar {
    width:4px;
    height:6px;
    background:var(--main-orange);
    margin:0 2px;
    animation:none;
}
.playing .viz-bar {
    animation:music 0.6s infinite alternate;
}
@keyframes music {
    from { height:6px; }
    to { height:20px; }
}

@media (max-width:768px){
    .main-wrapper { grid-template-columns:1fr; }
}
</style>
</head>

<body>

<div class="main-wrapper">

<div class="left-col">
    <div class="card profile-card">
        <div class="avatar-container">
            <img id="userImg" src="">
        </div>
        <h1>姚宜蓁</h1>
        <p>學號：114024082</p>
        <p>資訊傳播系學生</p>
    </div>

    <div class="card">
        <div class="section-title">我的愛好</div>
        <div class="interest-item"><div class="interest-icon">🎹</div>彈鋼琴</div>
        <div class="interest-item"><div class="interest-icon">📸</div>拍照攝影</div>
        <div class="interest-item"><div class="interest-icon">🎨</div>繪畫創作</div>
    </div>
</div>

<div class="right-col">
    <div class="card">
        <div class="section-title">關於我</div>
        <p>你好！我是宜蓁，喜歡透過影像與音樂表達情緒，對設計與創作充滿熱情。</p>
    </div>

    <div class="card">
        <div class="section-title">專業技能</div>
        <p>● Photoshop / Lightroom</p>
        <p>● HTML / CSS / JS</p>
        <p>● 影音企劃與劇本</p>
        <p>● 鋼琴演奏</p>

        <!-- 新增執照 -->
        <div class="section-title" style="margin-top:20px;">相關證照</div>
        <p>● 丙級平面設計技術士</p>
        <p>● 丙級製圖技術士</p>
    </div>
</div>

</div>

<!-- 音樂 -->
<div class="audio-bar" id="player">
    <span>🎵 點播放才會有音樂（瀏覽器限制）</span>
    <div style="display:flex">
        <div class="viz-bar"></div>
        <div class="viz-bar"></div>
        <div class="viz-bar"></div>
    </div>
    <audio id="audio" controls>
        <source src="music.mp3" type="audio/mpeg">
    </audio>
</div>

<script>
// 音樂動畫
const audio = document.getElementById("audio");
const player = document.getElementById("player");

audio.onplay = () => player.classList.add("playing");
audio.onpause = () => player.classList.remove("playing");

// 頭貼
const randomNum = Math.floor(Math.random()*1000);
document.getElementById('userImg').src = `https://i.pravatar.cc/300?u=${randomNum}`;
</script>

</body>
</html>
