<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>姚宜蓁｜個人履歷</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #fb923c;
            --primary-dark: #f97316;
            --bg-gradient: linear-gradient(135deg, #fff7ed, #ffe4e6);
            --card-bg: rgba(255, 255, 255, 0.8);
            --text-main: #5a3e36;
            --text-muted: #8c7169;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        }

        .dark-mode {
            --primary: #f97316;
            --primary-dark: #ea580c;
            --bg-gradient: linear-gradient(135deg, #1c1917, #292524);
            --card-bg: rgba(68, 64, 60, 0.8);
            --text-main: #f5e9e2;
            --text-muted: #a8a29e;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        * {
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            margin: 0;
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--text-main);
            line-height: 1.6;
        }

        /* --- Header --- */
        header {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            text-align: center;
            padding: 80px 20px;
            clip-path: ellipse(120% 100% at 50% 0%);
        }

        .avatar {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid rgba(255,255,255,0.8);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            margin-bottom: 20px;
        }

        header h1 {
            margin: 0;
            font-size: 2.5rem;
            letter-spacing: 3px;
            font-weight: 700;
        }

        .mode-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            background: var(--card-bg);
            border: none;
            padding: 12px;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: var(--shadow);
            color: var(--primary);
            font-size: 1.2rem;
        }

        /* --- Layout Grid --- */
        .container {
            max-width: 1100px;
            margin: -40px auto 40px;
            padding: 0 20px;
            display: grid;
            grid-template-columns: 1fr 2fr; /* 雙欄排版 */
            gap: 25px;
        }

        @media (max-width: 768px) {
            .container { grid-template-columns: 1fr; margin-top: 20px; }
            header { padding: 60px 20px; }
        }

        /* --- Cards --- */
        .card {
            background: var(--card-bg);
            backdrop-filter: blur(10px); /* 毛玻璃效果 */
            padding: 30px;
            border-radius: 24px;
            box-shadow: var(--shadow);
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .card:hover {
            transform: translateY(-5px);
        }

        h2 {
            font-size: 1.4rem;
            color: var(--primary);
            margin-top: 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        h2::after {
            content: "";
            flex: 1;
            height: 2px;
            background: var(--primary);
            opacity: 0.2;
        }

        /* --- Skills & Tags --- */
        .skill-item { margin-bottom: 18px; }
        .skill-info { display: flex; justify-content: space-between; margin-bottom: 6px; font-weight: bold; }
        
        .skill-bar {
            height: 8px;
            background: rgba(0,0,0,0.05);
            border-radius: 10px;
            overflow: hidden;
        }
        .skill-level {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--primary-dark));
            border-radius: 10px;
            width: 0; /* 動畫起始 */
            transition: width 1.5s cubic-bezier(0.1, 0.5, 0.5, 1);
        }

        .tags { display: flex; flex-wrap: wrap; gap: 10px; }
        .tag {
            background: var(--primary);
            color: white;
            padding: 6px 16px;
            border-radius: 50px;
            font-size: 0.9rem;
            opacity: 0.8;
        }
        .tag:hover { opacity: 1; transform: scale(1.05); }

        /* --- List & Contact --- */
        ul { padding-left: 20px; color: var(--text-muted); }
        li { margin-bottom: 10px; }
        
        .contact-link {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
            text-decoration: none;
            color: var(--text-main);
        }
        .contact-link i {
            width: 35px;
            height: 35px;
            background: var(--primary);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
        }

        footer {
            text-align: center;
            padding: 40px;
            opacity: 0.6;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

<button class="mode-toggle" onclick="toggleDark()" id="themeBtn">
    <i class="fas fa-moon"></i>
</button>

<header>
    <img class="avatar" src="https://i.pravatar.cc/300" alt="姚宜蓁">
