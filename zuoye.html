<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>姚宜蓁｜個人履歷</title>

<style>
body{
    font-family: "Noto Sans TC", Arial;
    margin:0;
    background:#f4f6f9;
    color:#333;
    transition:0.3s;
}

header{
    background:#4a6cf7;
    color:white;
    text-align:center;
    padding:40px 20px;
}

header h1{
    margin:10px 0 5px 0;
    font-size:36px;
}

.avatar{
    width:120px;
    height:120px;
    border-radius:50%;
    object-fit:cover;
    border:4px solid white;
    box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

.container{
    max-width:900px;
    margin:auto;
    padding:30px;
}

section{
    margin-bottom:40px;
}

h2{
    border-left:5px solid #4a6cf7;
    padding-left:10px;
}

.skill{
    margin:10px 0;
}

.skill-bar{
    background:#ddd;
    border-radius:20px;
    overflow:hidden;
}

.skill-level{
    height:10px;
    background:#4a6cf7;
}

.card{
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 4px 10px rgba(0,0,0,0.08);
}

button{
    background:#4a6cf7;
    color:white;
    border:none;
    padding:10px 16px;
    border-radius:6px;
    cursor:pointer;
}

.dark{
    background:#1e1e1e;
    color:#eee;
}

.dark .card{
    background:#2c2c2c;
}

footer{
    text-align:center;
    padding:20px;
    color:#888;
}
</style>

</head>
<body>

<header>

<!-- 隨機生成大頭照 -->
<img class="avatar" src="https://i.pravatar.cc/300" alt="隨機大頭照">

<h1>姚宜蓁</h1>
<p>個人履歷網站</p>

<button onclick="toggleDark()">切換深色模式</button>

</header>

<div class="container">

<section>
<div class="card">
<h2>自我介紹</h2>
<p>
您好，我是姚宜蓁。  
這裡是我的個人履歷網站，我對學習新技術、設計與數位創作充滿興趣。  
希望能在工作中持續成長並發揮自己的能力。
</p>
</div>
</section>

<section>
<div class="card">
<h2>技能</h2>

<div class="skill">
HTML
<div class="skill-bar">
<div class="skill-level" style="width:80%"></div>
</div>
</div>

<div class="skill">
CSS
<div class="skill-bar">
<div class="skill-level" style="width:75%"></div>
</div>
</div>

<div class="skill">
JavaScript
<div class="skill-bar">
<div class="skill-level" style="width:65%"></div>
</div>
</div>

</div>
</section>

<section>
<div class="card">
<h2>學歷 / 經歷</h2>
<ul>
<li>XXXX學校 — XXXX科系</li>
<li>XXXX公司 — XXXX職位</li>
<li>專案：XXXX網站開發</li>
</ul>
</div>
</section>

<section>
<div class="card">
<h2>聯絡方式</h2>
<p>Email：your@email.com</p>
<p>電話：09xx-xxx-xxx</p>
<p>GitHub：github.com/yourname</p>
</div>
</section>

</div>

<footer>
© 2026 姚宜蓁 Resume
</footer>

<script>

function toggleDark(){
    document.body.classList.toggle("dark");
}

</script>

</body>
</html>
