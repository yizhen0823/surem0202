<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>姚宜蓁｜個人履歷</title>

<style>
body{
    font-family: "Noto Sans TC", Arial;
    margin:0;
    background:linear-gradient(135deg,#eef2ff,#f8fafc);
    color:#333;
    transition:0.3s;
}

/* Header */
header{
    background:linear-gradient(135deg,#4a6cf7,#7c8cff);
    color:white;
    text-align:center;
    padding:50px 20px;
}

header h1{
    margin:10px 0 5px 0;
    font-size:36px;
}

header p{
    opacity:0.9;
}

/* 頭像 */
.avatar{
    width:130px;
    height:130px;
    border-radius:50%;
    object-fit:cover;
    border:5px solid white;
    box-shadow:0 6px 15px rgba(0,0,0,0.25);
    margin-bottom:10px;
}

/* Container */
.container{
    max-width:900px;
    margin:auto;
    padding:30px;
}

/* Section */
section{
    margin-bottom:30px;
}

/* 標題 */
h2{
    border-left:5px solid #4a6cf7;
    padding-left:10px;
    margin-bottom:15px;
}

/* 卡片 */
.card{
    background:white;
    padding:25px;
    border-radius:15px;
    box-shadow:0 6px 20px rgba(0,0,0,0.06);
    transition:0.3s;
}

.card:hover{
    transform:translateY(-5px);
}

/* 技能 */
.skill{
    margin:12px 0;
}

.skill-bar{
    background:#eee;
    border-radius:20px;
    overflow:hidden;
}

.skill-level{
    height:10px;
    background:linear-gradient(90deg,#4a6cf7,#7c8cff);
}

/* 興趣tag */
.tags{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    margin-top:10px;
}

.tag{
    background:#eef2ff;
    color:#4a6cf7;
    padding:8px 14px;
    border-radius:20px;
    font-size:14px;
}

/* 按鈕 */
button{
    background:white;
    color:#4a6cf7;
    border:none;
    padding:10px 16px;
    border-radius:20px;
    cursor:pointer;
    margin-top:10px;
    font-weight:bold;
}

/* 深色模式 */
.dark{
    background:#1e1e1e;
    color:#eee;
}

.dark .card{
    background:#2c2c2c;
}

.dark h2{
    border-left:5px solid #7c8cff;
}

.dark .tag{
    background:#333;
    color:#fff;
}

/* footer */
footer{
    text-align:center;
    padding:20px;
    color:#888;
}
</style>

</head>
<body>

<header>

<!-- ⚠️記得可以換成你自己的照片 -->
<img class="avatar" src="https://i.pravatar.cc/300" alt="大頭照">

<h1>姚宜蓁</h1>
<p>亞洲大學｜資訊傳播系</p>

<button onclick="toggleDark()">🌙 切換模式</button>

</header>

<div class="container">

<!-- 自我介紹 -->
<section>
<div class="card">
<h2>自我介紹</h2>
<p>
您好，我是姚宜蓁，目前就讀亞洲大學資訊傳播系。<br><br>
我喜歡數位創作與設計，對網頁前端開發充滿興趣，  
希望能將設計美感與技術結合，持續精進自己。
</p>
</div>
</section>

<!-- 技能 -->
<section>
<div class="card">
<h2>技能</h2>

<div class="skill">
HTML
<div class="skill-bar">
<div class="skill-level" style="width:80%"></div>
</div>
</div>

<div class="skill">
CSS
<div class="skill-bar">
<div class="skill-level" style="width:75%"></div>
</div>
</div>

<div class="skill">
JavaScript
<div class="skill-bar">
<div class="skill-level" style="width:65%"></div>
</div>
</div>

</div>
</section>

<!-- 興趣（新加） -->
<section>
<div class="card">
<h2>興趣與專長</h2>

<div class="tags">
<div class="tag">跳舞</div>
<div class="tag">鋼琴</div>
<div class="tag">Bass</div>
<div class="tag">攝影</div>
</div>

</div>
</section>

<!-- 學歷 -->
<section>
<div class="card">
<h2>學歷 / 經歷</h2>
<ul>
<li>亞洲大學 — 資訊傳播系</li>
<li>個人履歷網站製作</li>
<li>持續學習前端開發</li>
</ul>
</div>
</section>

<!-- 聯絡 -->
<section>
<div class="card">
<h2>聯絡方式</h2>
<p>Email：your@email.com</p>
<p>電話：09xx-xxx-xxx</p>
<p>GitHub：github.com/yourname</p>
</div>
</section>

</div>

<footer>
© 2026 姚宜蓁 Resume
</footer>

<script>
function toggleDark(){
    document.body.classList.toggle("dark");
}
</script>

</body>
</html>
