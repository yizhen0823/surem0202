<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>姚宜蓁 | 個人動態履歷</title>

<style>
:root {
    --bg-dark: #1a1a2e;
    --city-purple: #6C63FF;
    --neon-pink: #FF4D6D;
    --text-light: #f5f5f5;
}

body {
    font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
    margin: 0;
    padding: 40px 20px;
    color: var(--text-light);
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
    background: linear-gradient(120deg, #1a1a2e, #16213e);
}

/* 🌆 城市光暈背景 */
body::before {
    content: "";
    position: fixed;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle, rgba(255,77,109,0.15), transparent 60%);
    animation: glow 10s infinite alternate;
    z-index: -1;
}

@keyframes glow {
    from { transform: translate(-20%, -20%) scale(1); }
    to { transform: translate(0%, 0%) scale(1.2); }
}

/* 主排版 */
.main-wrapper {
    max-width: 1000px;
    width: 100%;
    display: grid;
    grid-template-columns: 1fr 1.5fr;
    gap: 30px;
    margin-bottom: 80px;
}

/* 卡片 */
.card {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(15px);
    border-radius: 25px;
    padding: 30px;
    border: 1px solid rgba(255,255,255,0.1);
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-8px) scale(1.02);
    box-shadow: 0 0 25px rgba(255,77,109,0.3);
}

/* 左側 */
.left-col { display: flex; flex-direction: column; gap: 25px; }

.profile-card {
    text-align: center;
    background: linear-gradient(135deg, #6C63FF, #FF4D6D);
}

.avatar-container {
    width: 150px;
    height: 150px;
    margin: 0 auto 20px;
    border-radius: 50%;
    border: 4px solid rgba(255,255,255,0.4);
    overflow: hidden;
}

.avatar-container img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.name-tag h1 {
    margin: 10px 0;
    font-size: 28px;
}

.name-tag p {
    opacity: 0.8;
}

/* 標題 */
.section-title {
    font-size: 20px;
    font-weight: bold;
    color: var(--neon-pink);
    margin-bottom: 15px;
    position: relative;
}

.section-title::after {
    content: "";
    display: block;
    width: 40px;
    height: 3px;
    background: var(--city-purple);
    margin-top: 5px;
}

/* 興趣 */
.interest-item {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 12px;
}

.interest-icon {
    background: var(--city-purple);
    width: 35px;
    height: 35px;
    border-radius: 10px;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* 音樂播放器 */
.audio-bar {
    position: fixed;
    bottom: 20px;
    width: 90%;
    max-width: 800px;
    background: rgba(0,0,0,0.7);
    padding: 15px 25px;
    border-radius: 50px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    backdrop-filter: blur(10px);
}

/* 音樂動畫 */
.viz-bar {
    width: 4px;
    height: 5px;
    background: var(--neon-pink);
    margin: 0 2px;
    animation: none;
}

.playing .viz-bar {
    animation: music 0.6s infinite alternate;
}

@keyframes music {
    from { height: 5px; }
    to { height: 20px; }
}

/* 響應式 */
@media (max-width: 768px) {
    .main-wrapper { grid-template-columns: 1fr; }
}
</style>
</head>

<body>

<div class="main-wrapper">

<div class="left-col">
    <div class="card profile-card">
        <div class="avatar-container">
            <img id="userImg" src="https://i.pravatar.cc/300?u=114024082">
        </div>
        <div class="name-tag">
            <h1>姚宜蓁</h1>
            <p>學號：114024082</p>
            <p>資訊傳播系學生</p>
        </div>
    </div>

    <div class="card">
        <div class="section-title">我的愛好</div>
        <div class="interest-item"><div class="interest-icon">🎹</div>彈鋼琴</div>
        <div class="interest-item"><div class="interest-icon">📸</div>拍照攝影</div>
        <div class="interest-item"><div class="interest-icon">🎨</div>繪畫創作</div>
    </div>
</div>

<div class="right-col">
    <div class="card">
        <div class="section-title">關於我</div>
        <p>你好！我是宜蓁。身為資傳系學生，我熱衷於挖掘數位內容中的美感，喜歡用影像與音樂表達情緒。</p>
    </div>

    <div class="card">
        <div class="section-title">專業技能</div>
        <p>● Photoshop / Lightroom</p>
        <p>● HTML / CSS / JS</p>
        <p>● 影音企劃與劇本</p>
        <p>● 鋼琴演奏</p>
    </div>
</div>

</div>

<!-- 音樂播放器 -->
<div class="audio-bar" id="player">
    <span>🎧 點擊播放音樂</span>
    <div style="display:flex">
        <div class="viz-bar"></div>
        <div class="viz-bar"></div>
        <div class="viz-bar"></div>
    </div>
    <audio id="audio" controls>
        <source src="music.mp3" type="audio/mpeg">
    </audio>
</div>

<script>
const audio = document.getElementById("audio");
const player = document.getElementById("player");

// 播放才會動
audio.onplay = () => player.classList.add("playing");
audio.onpause = () => player.classList.remove("playing");

// 頭貼隨機
const randomNum = Math.floor(Math.random() * 1000);
document.getElementById('userImg').src = `https://i.pravatar.cc/300?u=${randomNum}`;
</script>

</body>
</html>
